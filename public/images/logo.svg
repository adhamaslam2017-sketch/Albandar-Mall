<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="20%" style="stop-color:#FDB931;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFFACD;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#FDB931;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9E7E1D;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <circle cx="500" cy="500" r="480" fill="black" />
  <g transform="translate(100, 100) scale(0.8)" filter="url(#glow)">
    <!-- Frame -->
    <path d="M150 750 L300 400 L750 350 L600 700 Z" fill="none" stroke="url(#goldGradient)" stroke-width="50" stroke-linejoin="round" />
    
    <!-- Wavy Lines -->
    <path d="M350 700 C450 500 400 300 600 100" fill="none" stroke="url(#goldGradient)" stroke-width="80" stroke-linecap="round" />
    <path d="M450 700 C550 500 500 300 700 150" fill="none" stroke="url(#goldGradient)" stroke-width="80" stroke-linecap="round" />
    <path d="M550 700 C650 500 600 300 800 200" fill="none" stroke="url(#goldGradient)" stroke-width="80" stroke-linecap="round" />
    
    <!-- Dot -->
    <circle cx="300" cy="150" r="50" fill="url(#goldGradient)" />
  </g>
</svg>
